<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Habits</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="habits-page">

<div class="top-bar">
    <div class="title-section">
        <a href="dashboard.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
            <h1 style="margin: 0; cursor: pointer;">📖 Eunoia</h1>
        </a>
    </div>

    <div class="nav">
        <div class="back-arrow" onclick="history.back()" style="cursor:pointer">⬅️</div>
        <a href="journal.html">✍️ Journal</a>
        <a href="todo.html">☑️ To Do</a>
        <a href="habits.html" class="active">🎯 Habits</a>
        <a href="mood.html">😊 Mood</a>
    </div>
</div>

<div class="habits-wrapper">
    <div class="card habits-main-card">
        <h2 class="card-title">Habit Tracker</h2>
        
        <div class="habit-input-container">
            <input type="text" id="habitInput" placeholder="Add a new habit...">
            <button type="button" class="habit-add-btn">Add</button>
        </div>

        <div id="habitList" class="habit-list">
            </div>

        <div class="history-section">
            <h2 class="card-title">Habit History</h2>
            <div class="history-table-container">
                <table class="habit-table">
                    <thead>
                        <tr id="tableHeader">
                            </tr>
                    </thead>
                    <tbody id="habitHistoryBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="habits.js"></script>
</body>
</html>
